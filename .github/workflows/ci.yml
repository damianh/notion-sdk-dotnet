name: ci

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run library tests
      run: dotnet run --project test/Tests/Tests.csproj --no-build --configuration Release

    - name: Run CLI tests
      run: dotnet run --project test/NotionCli.Tests/NotionCli.Tests.csproj --no-build --configuration Release

    - name: Build NuGet packages
      run: |
        dotnet pack src/NotionClient/NotionClient.csproj --no-build --configuration Release --output ./packages
        dotnet pack src/NotionCli/NotionCli.csproj --no-build --configuration Release --output ./packages

    - name: Upload NuGet packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: |
          ./packages/*.nupkg
          ./packages/*.snupkg

    - name: Add build summary
      if: always()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "✅ Build completed" >> $GITHUB_STEP_SUMMARY
        echo "✅ Library tests executed" >> $GITHUB_STEP_SUMMARY
        echo "✅ CLI tests executed" >> $GITHUB_STEP_SUMMARY
        echo "✅ NuGet packages created" >> $GITHUB_STEP_SUMMARY
